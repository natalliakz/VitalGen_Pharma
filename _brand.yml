meta:
  name:
    short: VitalGen
    full: VitalGen Therapeutics
  link:
    home: https://www.vitalgen-therapeutics.example.com

color:
  palette:
    white: "#FFFFFF"
    black: "#1A1A1A"
    deep-blue: "#003D7A"
    teal: "#00A3A1"
    light-blue: "#5CB3CC"
    orange: "#F47B20"
    green: "#7AB800"
    gray: "#6D6E71"
    light-gray: "#E5E5E5"

  foreground: "#1A1A1A"
  background: "#FFFFFF"
  primary: "#003D7A"
  secondary: "#6D6E71"
  tertiary: "#E5E5E5"
  success: "#7AB800"
  info: "#5CB3CC"
  warning: "#F47B20"
  danger: "#D32F2F"
  light: "#FFFFFF"
  dark: "#1A1A1A"

typography:
  fonts:
    - family: Inter
      source: google
      weight: [300, 400, 500, 600, 700]
      style: [normal]
    - family: Roboto Slab
      source: google
      weight: [400, 600]
      style: [normal]

  base:
    family: Inter
    weight: 400
    size: 16px
    line-height: 1.6

  headings:
    family: Roboto Slab
    weight: 600
    line-height: 1.3
    color: "#003D7A"

  monospace:
    family: monospace
    size: 0.9em

  link:
    color: "#00A3A1"
    decoration: none
